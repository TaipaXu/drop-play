<!doctype html>
<html lang="">
    <head>
        <meta charset="UTF-8" />
        <link
        rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%23a855f7'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M12 8l12 8-12 8V8z' fill='white'/></svg>" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drop Play</title>
        <script>
            (() => {
                try {
                    const stored = localStorage.getItem('drop-play-theme');
                    const systemTheme = matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark'
                        : 'light';
                    const theme = stored === 'light' || stored === 'dark' ? stored : systemTheme;

                    document.documentElement.dataset.theme = theme;
                    document.documentElement.style.colorScheme = theme;
                } catch {
                    document.documentElement.dataset.theme = 'light';
                    document.documentElement.style.colorScheme = 'light';
                }
            })();
        </script>
    </head>
    <body style="margin: 0; overflow: hidden">
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
